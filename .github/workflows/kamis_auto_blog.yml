name: KAMIS Auto Blog Bot

on:
  schedule:
    # 09:00 KST = 00:00 UTC
    - cron: '0 0 * * *'
    # 13:00 KST = 04:00 UTC
    - cron: '0 4 * * *'
    # 17:00 KST = 08:00 UTC
    - cron: '0 8 * * *'
    # 21:00 KST = 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install seaborn

      - name: Fetch Font
        run: |
          python setup_env.py

      - name: Run Script for 09:00
        if: github.event.schedule == '0 0 * * *'
        env:
          KAMIS_API_KEY: ${{ secrets.KAMIS_API_KEY }}
          KAMIS_API_ID: ${{ secrets.KAMIS_API_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main_auto.py "09:00"

      - name: Run Script for 13:00
        if: github.event.schedule == '0 4 * * *'
        env:
          KAMIS_API_KEY: ${{ secrets.KAMIS_API_KEY }}
          KAMIS_API_ID: ${{ secrets.KAMIS_API_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main_auto.py "13:00"

      - name: Run Script for 17:00
        if: github.event.schedule == '0 8 * * *'
        env:
          KAMIS_API_KEY: ${{ secrets.KAMIS_API_KEY }}
          KAMIS_API_ID: ${{ secrets.KAMIS_API_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main_auto.py "17:00"

      - name: Run Script for 21:00
        if: github.event.schedule == '0 12 * * *'
        env:
          KAMIS_API_KEY: ${{ secrets.KAMIS_API_KEY }}
          KAMIS_API_ID: ${{ secrets.KAMIS_API_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main_auto.py "21:00"

      - name: Commit and Push output
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "Kamis Auto Bot"
          git add output/
          git commit -m "Auto generated posts and images" || echo "No changes to commit"
          git push
